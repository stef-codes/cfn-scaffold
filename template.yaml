AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Synthetic LMS delivery prototype: S3 -> SQS -> Lambda -> mock HTTP API.
  The Lambda reads a CSV from S3 and writes an S3 checkpoint only after
  every row is accepted by the API. Pure CloudFormation; no SAM transform.

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, test]
  ProjectName:
    Type: String
    Default: pipeline-prototype
  LambdaCodeS3Bucket:
    Type: String
    Description: S3 bucket containing the Lambda deployment ZIP.
  LambdaCodeS3Key:
    Type: String
    Description: S3 key for the Lambda deployment ZIP.

Resources:
  PipelineKmsKey:
    Type: AWS::KMS::Key
    Properties:
      Description: !Sub 'KMS key for ${ProjectName} ${Environment}'
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: EnableRootPermissions
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 'kms:*'
            Resource: '*'
          - Sid: AllowAwsServices
            Effect: Allow
            Principal:
              Service:
                - s3.amazonaws.com
                - sqs.amazonaws.com
            Action:
              - kms:Decrypt
              - kms:GenerateDataKey
            Resource: '*'

  IngestDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub '${ProjectName}-${Environment}-ingest-dlq'
      KmsMasterKeyId: !Ref PipelineKmsKey
      MessageRetentionPeriod: 1209600

  IngestQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub '${ProjectName}-${Environment}-ingest'
      VisibilityTimeout: 180
      KmsMasterKeyId: !Ref PipelineKmsKey
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt IngestDLQ.Arn
        maxReceiveCount: 5

  IngestQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues: [!Ref IngestQueue]
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowS3Send
            Effect: Allow
            Principal:
              Service: s3.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt IngestQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Sub 'arn:aws:s3:::${ProjectName}-${Environment}-incoming-${AWS::AccountId}'
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId

  IncomingBucket:
    Type: AWS::S3::Bucket
    DependsOn: IngestQueuePolicy
    Properties:
      BucketName: !Sub '${ProjectName}-${Environment}-incoming-${AWS::AccountId}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: !Ref PipelineKmsKey
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      NotificationConfiguration:
        QueueConfigurations:
          - Event: s3:ObjectCreated:*
            Queue: !GetAtt IngestQueue.Arn
            Filter:
              S3Key:
                Rules:
                  - Name: prefix
                    Value: incoming/
                  - Name: suffix
                    Value: .csv

  ProcessFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-${Environment}-process-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: process-permissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: ConsumeQueue
                Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                Resource: !GetAtt IngestQueue.Arn
              - Sid: ReadIncomingAndManageCheckpoints
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                Resource:
                  - !Sub '${IncomingBucket.Arn}/incoming/*'
                  - !Sub '${IncomingBucket.Arn}/checkpoints/*'
              - Sid: UseKmsKey
                Effect: Allow
                Action:
                  - kms:Decrypt
                  - kms:GenerateDataKey
                Resource: !GetAtt PipelineKmsKey.Arn
              - Sid: WriteXrayTrace
                Effect: Allow
                Action:
                  - xray:PutTraceSegments
                  - xray:PutTelemetryRecords
                Resource: '*'

  MockReceiverRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-${Environment}-mock-receiver-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  MockReceiverFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${ProjectName}-${Environment}-mock-receiver'
      Runtime: python3.12
      Handler: mock_receiver.handler
      Role: !GetAtt MockReceiverRole.Arn
      Timeout: 10
      MemorySize: 128
      Code:
        S3Bucket: !Ref LambdaCodeS3Bucket
        S3Key: !Ref LambdaCodeS3Key

  MockApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub '${ProjectName}-${Environment}-mock-api'
      ProtocolType: HTTP

  MockApiIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref MockApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt MockReceiverFunction.Arn
      PayloadFormatVersion: '2.0'

  MockApiRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref MockApi
      RouteKey: 'POST /learning-objects'
      Target: !Sub 'integrations/${MockApiIntegration}'

  MockApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref MockApi
      StageName: '$default'
      AutoDeploy: true

  MockApiInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref MockReceiverFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${MockApi}/*/POST/learning-objects'

  ProcessFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${ProjectName}-${Environment}-process-dump'
      Runtime: python3.12
      Handler: process_dump.handler
      Role: !GetAtt ProcessFunctionRole.Arn
      Timeout: 120
      MemorySize: 256
      TracingConfig:
        Mode: Active
      Environment:
        Variables:
          API_URL: !Sub '${MockApi.ApiEndpoint}/learning-objects'
      Code:
        S3Bucket: !Ref LambdaCodeS3Bucket
        S3Key: !Ref LambdaCodeS3Key

  ProcessFunctionEventSourceMapping:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      EventSourceArn: !GetAtt IngestQueue.Arn
      FunctionName: !GetAtt ProcessFunction.Arn
      BatchSize: 1
      FunctionResponseTypes:
        - ReportBatchItemFailures

  DlqDepthAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${ProjectName}-${Environment}-ingest-dlq-depth'
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Dimensions:
        - Name: QueueName
          Value: !GetAtt IngestDLQ.QueueName
      Statistic: Maximum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching

Outputs:
  IncomingBucketName:
    Value: !Ref IncomingBucket
  IngestQueueUrl:
    Value: !Ref IngestQueue
  ProcessFunctionName:
    Value: !Ref ProcessFunction
  MockApiUrl:
    Value: !Sub '${MockApi.ApiEndpoint}/learning-objects'
